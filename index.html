<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#e7ddc4" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Accord 1936" />
    <title>Accord 1936</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="map"></div>

    <header id="topbar">
      <div class="brand">
        <span class="title">ACCORD&nbsp;1936</span>
        <span id="hud-nation" class="subtitle"></span>
      </div>
      <div class="hud-stats">
        <span id="hud-treasury" title="Treasury"></span>
        <span id="hud-capital" title="Political capital"></span>
        <span id="hud-stability" title="Stability"></span>
        <span id="hud-standing" title="Standing"></span>
        <span id="hud-tension" title="World tension"></span>
        <span id="hud-offers" class="badge" title="Awaiting your answer"></span>
      </div>
      <div class="turn-controls">
        <span id="date"></span>
        <button id="end-turn">End Turn ▸</button>
      </div>
    </header>

    <div id="map-modes"></div>
    <nav id="nav"></nav>

    <section id="panel" class="hidden"></section>
    <div id="modal" class="hidden"></div>
    <div id="toast" class="hidden"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
